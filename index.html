<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<title>NetPlayer — Netflix-style Video Player</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{ --nf-red:#E50914; --nf-red2:#ff0f1a; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; background:#000; font-family:'Archivo',Helvetica,Arial,sans-serif; }
  body{ overflow:hidden; }

  #stage{ position:fixed; inset:0; background:#000; display:grid; place-items:center; }
  #player{ position:relative; width:100%; height:100%; background:#000; overflow:hidden; }
  video{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain; background:#000; }

  /* ----- gesture layer (captures taps, sits above video, below controls) ----- */
  #gesture{ position:absolute; inset:0; z-index:10; cursor:pointer; }

  /* ----- idle auto-hide ----- */
  #player.idle{ cursor:none; }
  #player.idle .chrome{ opacity:0; pointer-events:none; transform:translateY(var(--hide-shift,0)); }
  .chrome{ transition:opacity .4s ease, transform .4s ease; }

  /* ----- scrims (gradient bars) ----- */
  .scrim-top{ background:linear-gradient(to bottom, rgba(0,0,0,.75) 0%, rgba(0,0,0,.35) 45%, rgba(0,0,0,0) 100%); }
  .scrim-bottom{ background:linear-gradient(to top, rgba(0,0,0,.88) 0%, rgba(0,0,0,.55) 30%, rgba(0,0,0,.15) 70%, rgba(0,0,0,0) 100%); }

  /* ----- center play/pause burst ----- */
  #centerBurst{ position:absolute; inset:0; z-index:20; display:grid; place-items:center; pointer-events:none; }
  #centerBurst .ring{ width:88px; height:88px; border-radius:50%; background:rgba(20,20,20,.55); backdrop-filter:blur(2px);
    display:grid; place-items:center; color:#fff; font-size:34px; opacity:0; transform:scale(.5); }
  #centerBurst.go .ring{ animation:burst .55s cubic-bezier(.2,.7,.3,1) forwards; }
  @keyframes burst{ 0%{opacity:.9;transform:scale(.55)} 60%{opacity:.85;transform:scale(1.05)} 100%{opacity:0;transform:scale(1.5)} }

  /* ----- double-tap seek ripple ----- */
  .seekfx{ position:absolute; top:0; bottom:0; width:42%; z-index:19; pointer-events:none; display:grid; place-items:center; color:#fff; opacity:0; }
  .seekfx.left{ left:0; border-radius:0 50% 50% 0/0 50% 50% 0; }
  .seekfx.right{ right:0; border-radius:50% 0 0 50%/50% 0 0 50%; }
  .seekfx.go{ animation:seekflash .6s ease forwards; }
  @keyframes seekflash{ 0%{opacity:0;background:rgba(255,255,255,0)} 25%{opacity:1;background:rgba(255,255,255,.14)} 100%{opacity:0;background:rgba(255,255,255,0)} }
  .seekfx .chev{ display:flex; gap:-4px; font-size:22px; }
  .seekfx .chev i{ animation:chevpulse .6s ease infinite; }
  .seekfx .chev i:nth-child(2){ animation-delay:.1s } .seekfx .chev i:nth-child(3){ animation-delay:.2s }
  @keyframes chevpulse{ 0%,100%{opacity:.4} 50%{opacity:1} }

  /* ----- progress bar ----- */
  #progWrap{ padding:14px 0 8px; cursor:pointer; }
  #progTrack{ position:relative; height:4px; border-radius:4px; background:rgba(255,255,255,.3); transition:height .15s ease; }
  #progWrap:hover #progTrack{ height:7px; }
  #buffered{ position:absolute; left:0; top:0; bottom:0; border-radius:4px; background:rgba(255,255,255,.45); width:0; }
  #played{ position:absolute; left:0; top:0; bottom:0; border-radius:4px; background:var(--nf-red); width:0; }
  #scrub{ position:absolute; top:50%; transform:translate(-50%,-50%) scale(0); width:14px; height:14px; border-radius:50%;
    background:var(--nf-red); box-shadow:0 0 0 4px rgba(229,9,20,.25); transition:transform .15s ease; left:0; }
  #progWrap:hover #scrub, #progWrap.scrubbing #scrub{ transform:translate(-50%,-50%) scale(1); }
  #hoverTip{ position:absolute; bottom:22px; transform:translateX(-50%); background:rgba(0,0,0,.85); color:#fff; font-size:12px;
    padding:3px 8px; border-radius:5px; font-variant-numeric:tabular-nums; opacity:0; transition:opacity .15s; white-space:nowrap; }
  #progWrap:hover #hoverTip{ opacity:1; }

  /* ----- control buttons ----- */
  .cbtn{ background:none; border:0; color:#fff; cursor:pointer; width:42px; height:42px; display:grid; place-items:center;
    font-size:21px; border-radius:8px; transition:transform .15s ease, color .15s ease, background .15s ease; }
  .cbtn:hover{ transform:scale(1.12); }
  .cbtn:active{ transform:scale(.95); }
  .cbtn.lg{ font-size:26px; width:48px; height:48px; }

  /* ----- volume ----- */
  #volGroup{ display:flex; align-items:center; }
  #volSliderWrap{ width:0; overflow:hidden; transition:width .28s cubic-bezier(.2,.7,.3,1); display:flex; align-items:center; }
  #volGroup:hover #volSliderWrap{ width:90px; }
  #vol{ -webkit-appearance:none; appearance:none; width:80px; height:4px; border-radius:4px; background:rgba(255,255,255,.35); outline:none; cursor:pointer; }
  #vol::-webkit-slider-thumb{ -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:#fff; cursor:pointer; }
  #vol::-moz-range-thumb{ width:13px; height:13px; border:0; border-radius:50%; background:#fff; cursor:pointer; }

  /* ----- popup menus ----- */
  .menu{ position:absolute; bottom:64px; right:8px; min-width:180px; background:rgba(20,20,20,.96); backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:6px; box-shadow:0 20px 50px rgba(0,0,0,.6);
    opacity:0; transform:translateY(8px) scale(.97); pointer-events:none; transition:all .2s cubic-bezier(.2,.7,.3,1); z-index:35; }
  .menu.open{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .menu .mi{ display:flex; align-items:center; justify-content:space-between; gap:18px; padding:9px 12px; border-radius:7px;
    color:#ddd; font-size:14px; cursor:pointer; transition:background .15s; }
  .menu .mi:hover{ background:rgba(255,255,255,.1); color:#fff; }
  .menu .mi.active{ color:#fff; font-weight:700; }
  .menu .mi.active .tick{ color:var(--nf-red); }
  .menu .mt{ padding:8px 12px 6px; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#888; font-weight:700; }

  /* episodes/playlist panel slides from right */
  #playlist{ position:absolute; top:0; right:0; bottom:0; width:min(360px,86%); z-index:38; background:rgba(15,15,15,.97);
    backdrop-filter:blur(10px); border-left:1px solid rgba(255,255,255,.08); transform:translateX(100%); transition:transform .32s cubic-bezier(.2,.7,.3,1);
    display:flex; flex-direction:column; }
  #playlist.open{ transform:translateX(0); }
  .pl-item{ display:flex; gap:12px; padding:10px; border-radius:10px; cursor:pointer; transition:background .15s; align-items:center; }
  .pl-item:hover{ background:rgba(255,255,255,.07); }
  .pl-item.active{ background:rgba(229,9,20,.16); }
  .pl-thumb{ width:90px; height:52px; border-radius:6px; background:#222; display:grid; place-items:center; color:#666; flex-shrink:0; overflow:hidden; }

  .scroll{ overflow-y:auto; scrollbar-width:thin; scrollbar-color:#444 transparent; }
  .scroll::-webkit-scrollbar{ width:7px; } .scroll::-webkit-scrollbar-thumb{ background:#444; border-radius:7px; }

  /* subtitle styling */
  video::cue{ background:rgba(0,0,0,.6); color:#fff; font-family:'Archivo',sans-serif; font-size:1.1em; }

  /* spinner */
  #spin{ position:absolute; inset:0; z-index:18; display:none; place-items:center; pointer-events:none; }
  #spin.show{ display:grid; }
  #spin .s{ width:54px; height:54px; border:4px solid rgba(255,255,255,.2); border-top-color:var(--nf-red); border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* zero-state */
  #empty{ position:absolute; inset:0; z-index:40; display:grid; place-items:center; background:radial-gradient(circle at 50% 35%, #1a1a1a, #000 70%); }
  @keyframes fadeUp{ from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .a-up{ animation:fadeUp .5s cubic-bezier(.16,.84,.44,1) both; }

  [hidden]{ display:none !important; }
  .tnum{ font-variant-numeric:tabular-nums; }
  .badge{ font-size:11px; font-weight:800; letter-spacing:.04em; }
</style>
</head>

<body>
<div id="stage">
  <div id="player">
    <video id="v" playsinline preload="metadata" crossorigin="anonymous"></video>

    <!-- gesture capture -->
    <div id="gesture"></div>

    <!-- double-tap seek FX -->
    <div class="seekfx left" id="fxLeft"><div style="text-align:center">
      <div class="chev"><i class="fa-solid fa-chevron-left"></i><i class="fa-solid fa-chevron-left"></i><i class="fa-solid fa-chevron-left"></i></div>
      <div style="font-size:13px;font-weight:700;margin-top:4px">10 seconds</div></div></div>
    <div class="seekfx right" id="fxRight"><div style="text-align:center">
      <div class="chev"><i class="fa-solid fa-chevron-right"></i><i class="fa-solid fa-chevron-right"></i><i class="fa-solid fa-chevron-right"></i></div>
      <div style="font-size:13px;font-weight:700;margin-top:4px">10 seconds</div></div></div>

    <!-- center burst -->
    <div id="centerBurst"><div class="ring"><i id="burstIcon" class="fa-solid fa-play"></i></div></div>

    <!-- buffering spinner -->
    <div id="spin"><div class="s"></div></div>

    <!-- TOP TITLE BAR -->
    <div class="chrome scrim-top" style="--hide-shift:-12px; position:absolute; top:0; left:0; right:0; z-index:30; padding:18px 18px 40px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px;">
      <div class="flex items-center gap-3 min-w-0">
        <button class="cbtn" onclick="exitOrBack()" title="Back" style="width:40px;height:40px;font-size:20px"><i class="fa-solid fa-arrow-left"></i></button>
        <div class="min-w-0">
          <div id="title" class="text-white font-bold text-[17px] sm:text-[20px] truncate" style="max-width:60vw">No video loaded</div>
          <div id="subtitleLine" class="text-[12px] sm:text-[13px]" style="color:#bbb"></div>
        </div>
      </div>
      <!-- hidden-in-corner local upload -->
      <label class="cbtn" title="Open local file" style="width:40px;height:40px;font-size:19px;background:rgba(255,255,255,.08)">
        <i class="fa-solid fa-folder-open"></i>
        <input id="fileInput" type="file" accept="video/*" multiple class="hidden">
      </label>
    </div>

    <!-- BOTTOM CONTROL BAR -->
    <div class="chrome scrim-bottom" style="--hide-shift:14px; position:absolute; left:0; right:0; bottom:0; z-index:30; padding:0 14px 8px;">
      <!-- progress -->
      <div id="progWrap">
        <div id="progTrack">
          <div id="buffered"></div>
          <div id="played"></div>
          <div id="scrub"></div>
          <div id="hoverTip">00:00</div>
        </div>
      </div>

      <!-- buttons row -->
      <div class="flex items-center justify-between gap-2 select-none">
        <!-- LEFT -->
        <div class="flex items-center gap-0.5 sm:gap-1">
          <button class="cbtn lg" id="playBtn" onclick="togglePlay()" title="Play/Pause"><i class="fa-solid fa-play"></i></button>
          <button class="cbtn" onclick="seekBy(-10);showSeekFX('left')" title="Rewind 10s">
            <span style="position:relative;display:grid;place-items:center"><i class="fa-solid fa-rotate-left"></i><span style="position:absolute;font-size:8px;font-weight:800;top:1px">10</span></span>
          </button>
          <button class="cbtn" onclick="seekBy(10);showSeekFX('right')" title="Forward 10s">
            <span style="position:relative;display:grid;place-items:center"><i class="fa-solid fa-rotate-right"></i><span style="position:absolute;font-size:8px;font-weight:800;top:1px">10</span></span>
          </button>
          <div id="volGroup">
            <button class="cbtn" id="volBtn" onclick="toggleMute()" title="Mute"><i class="fa-solid fa-volume-high"></i></button>
            <div id="volSliderWrap"><input id="vol" type="range" min="0" max="1" step="0.01" value="1"></div>
          </div>
          <div class="text-white text-[12.5px] sm:text-[14px] font-semibold tnum ml-2 whitespace-nowrap" id="timeText">00:00&nbsp;/&nbsp;00:00</div>
        </div>

        <!-- RIGHT -->
        <div class="flex items-center gap-0.5 sm:gap-1">
          <button class="cbtn" id="speedBtn" onclick="toggleMenu('speed')" title="Playback speed">
            <span class="badge" style="font-size:13px">1x</span>
          </button>
          <button class="cbtn" onclick="togglePlaylist()" title="Episodes / Playlist"><i class="fa-solid fa-list"></i></button>
          <button class="cbtn" id="ccBtn" onclick="toggleMenu('cc')" title="Subtitles/CC"><i class="fa-regular fa-closed-captioning"></i></button>
          <button class="cbtn" id="fsBtn" onclick="toggleFullscreen()" title="Fullscreen"><i class="fa-solid fa-expand"></i></button>
        </div>
      </div>
    </div>

    <!-- SPEED MENU -->
    <div class="menu" id="menuSpeed" style="right:120px">
      <div class="mt">Playback Speed</div>
      <div id="speedList"></div>
    </div>

    <!-- CC MENU -->
    <div class="menu" id="menuCC" style="right:54px">
      <div class="mt">Subtitles / CC</div>
      <div class="mi" data-cc="off" onclick="setCC('off')"><span>Off</span><span class="tick"><i class="fa-solid fa-check"></i></span></div>
      <div class="mi" id="ccOn" data-cc="on" onclick="setCC('on')" style="display:none"><span id="ccLabel">English</span><span class="tick"><i class="fa-solid fa-check"></i></span></div>
      <label class="mi" style="border-top:1px solid rgba(255,255,255,.1);margin-top:4px;cursor:pointer">
        <span><i class="fa-solid fa-plus mr-2"></i>Load .vtt subtitle…</span>
        <input id="vttInput" type="file" accept=".vtt" class="hidden">
      </label>
    </div>

    <!-- PLAYLIST PANEL -->
    <div id="playlist" class="chrome">
      <div class="flex items-center justify-between p-4 border-b" style="border-color:rgba(255,255,255,.08)">
        <div class="text-white font-bold text-[16px]"><i class="fa-solid fa-list mr-2" style="color:var(--nf-red)"></i>Up Next</div>
        <button class="cbtn" onclick="togglePlaylist()" style="width:36px;height:36px;font-size:17px"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="plList" class="scroll flex-1 p-2"></div>
      <label class="m-3 text-center py-3 rounded-lg font-bold text-white cursor-pointer" style="background:rgba(255,255,255,.1)">
        <i class="fa-solid fa-plus mr-2"></i>Add videos
        <input type="file" accept="video/*" multiple class="hidden" onchange="addFiles(event)">
      </label>
    </div>

    <!-- ZERO STATE -->
    <div id="empty">
      <div class="a-up text-center px-8">
        <div class="font-extrabold tracking-tight" style="color:var(--nf-red); font-size:46px; letter-spacing:-.02em; text-shadow:0 6px 30px rgba(229,9,20,.5)">NETPLAYER</div>
        <p class="text-white/80 mt-3 text-[15px] max-w-sm mx-auto">A Netflix-grade player for your own movies. Pick a video file to start watching.</p>
        <label class="inline-flex items-center gap-2 mt-7 px-7 py-3.5 rounded-md font-bold text-white text-[16px] cursor-pointer" style="background:var(--nf-red)">
          <i class="fa-solid fa-play"></i> Browse Files
          <input type="file" accept="video/*" multiple class="hidden" onchange="addFiles(event)">
        </label>
        <p class="text-white/40 mt-5 text-[12.5px]">Tip: ? play/pause · ? ? seek · ? ? volume · F fullscreen · M mute · double-tap sides to skip</p>
      </div>
    </div>

  </div>
</div>

<script>
/* ============================================================
   NETPLAYER — Netflix-style HTML5 player (vanilla JS)
   ============================================================ */
const v        = document.getElementById('v');
const player   = document.getElementById('player');
const gesture  = document.getElementById('gesture');
const playedEl = document.getElementById('played');
const buffEl   = document.getElementById('buffered');
const scrubEl  = document.getElementById('scrub');
const progWrap = document.getElementById('progWrap');
const progTrack= document.getElementById('progTrack');
const hoverTip = document.getElementById('hoverTip');
const timeText = document.getElementById('timeText');
const playBtn  = document.getElementById('playBtn');
const burst    = document.getElementById('centerBurst');
const burstIcon= document.getElementById('burstIcon');
const spin     = document.getElementById('spin');

let playlist = [];     // { name, url, type } — ZERO STATE: empty
let currentIndex = -1;
let menuOpen = false;
let hoverControls = false;
let playlistOpen = false;

/* ---------- time format ---------- */
function fmt(t){
  if(!isFinite(t)||t<0) t=0;
  const h=Math.floor(t/3600), m=Math.floor(t%3600/60), s=Math.floor(t%60);
  const mm = h ? String(m).padStart(2,'0') : String(m).padStart(2,'0');
  return (h ? h+':' : '') + mm + ':' + String(s).padStart(2,'0');
}

/* ============================================================
   PLAYBACK
   ============================================================ */
function togglePlay(){ v.paused ? v.play() : v.pause(); }
function seekBy(sec){ if(!v.duration) return; v.currentTime = Math.min(Math.max(0, v.currentTime+sec), v.duration); updateProgress(); }

v.addEventListener('play', ()=>{ setPlayIcon(true); showBurst('play'); scheduleHide(); });
v.addEventListener('pause',()=>{ setPlayIcon(false); showBurst('pause'); showControls(true); });
v.addEventListener('timeupdate', updateProgress);
v.addEventListener('progress', updateBuffered);
v.addEventListener('loadedmetadata', ()=>{ updateProgress(); });
v.addEventListener('waiting', ()=> spin.classList.add('show'));
v.addEventListener('playing', ()=> spin.classList.remove('show'));
v.addEventListener('canplay', ()=> spin.classList.remove('show'));
v.addEventListener('ended', ()=>{ if(currentIndex < playlist.length-1) playIndex(currentIndex+1); else showControls(true); });

function setPlayIcon(playing){
  playBtn.innerHTML = playing ? '<i class="fa-solid fa-pause"></i>' : '<i class="fa-solid fa-play"></i>';
}

function updateProgress(){
  const d=v.duration||0, c=v.currentTime||0;
  const pct = d? (c/d*100) : 0;
  playedEl.style.width = pct+'%';
  scrubEl.style.left = pct+'%';
  timeText.innerHTML = `${fmt(c)}&nbsp;/&nbsp;${fmt(d)}`;
  updateBuffered();
}
function updateBuffered(){
  try{ if(v.buffered.length){ const end=v.buffered.end(v.buffered.length-1); const d=v.duration||1; buffEl.style.width=(end/d*100)+'%'; } }catch{}
}

/* ============================================================
   PROGRESS BAR — click + drag scrub + hover tooltip
   ============================================================ */
function ratioFromEvent(e){
  const r=progTrack.getBoundingClientRect();
  const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
  return Math.min(1, Math.max(0, x/r.width));
}
let scrubbing=false;
progWrap.addEventListener('pointerdown', e=>{ if(!v.duration) return; scrubbing=true; progWrap.classList.add('scrubbing'); seekToRatio(ratioFromEvent(e)); });
window.addEventListener('pointermove', e=>{ if(scrubbing){ seekToRatio(ratioFromEvent(e)); } });
window.addEventListener('pointerup', ()=>{ if(scrubbing){ scrubbing=false; progWrap.classList.remove('scrubbing'); } });
progWrap.addEventListener('pointermove', e=>{
  if(!v.duration) return;
  const r=progTrack.getBoundingClientRect(); const ratio=ratioFromEvent(e);
  hoverTip.textContent=fmt(ratio*v.duration);
  hoverTip.style.left=Math.min(Math.max((e.clientX-r.left),24), r.width-24)+'px';
});
function seekToRatio(ratio){ if(!v.duration) return; v.currentTime=ratio*v.duration; updateProgress(); showControls(); }

/* ============================================================
   VOLUME
   ============================================================ */
const vol=document.getElementById('vol'), volBtn=document.getElementById('volBtn');
vol.addEventListener('input', ()=>{ v.volume=+vol.value; v.muted=(+vol.value===0); paintVol(); });
function toggleMute(){ v.muted=!v.muted; if(!v.muted && v.volume===0){ v.volume=.5; vol.value=.5; } paintVol(); }
function paintVol(){
  const lvl = v.muted?0:v.volume;
  vol.value=lvl;
  vol.style.background=`linear-gradient(to right, var(--nf-red) ${lvl*100}%, rgba(255,255,255,.35) ${lvl*100}%)`;
  volBtn.innerHTML = lvl===0 ? '<i class="fa-solid fa-volume-xmark"></i>' : lvl<.5 ? '<i class="fa-solid fa-volume-low"></i>' : '<i class="fa-solid fa-volume-high"></i>';
}

/* ============================================================
   CENTER BURST + SEEK FX
   ============================================================ */
function showBurst(kind){
  burstIcon.className = kind==='play' ? 'fa-solid fa-play' : 'fa-solid fa-pause';
  burst.classList.remove('go'); void burst.offsetWidth; burst.classList.add('go');
}
function showSeekFX(side){
  const el=document.getElementById(side==='left'?'fxLeft':'fxRight');
  el.classList.remove('go'); void el.offsetWidth; el.classList.add('go');
}

/* ============================================================
   GESTURES — single tap toggles play, double-tap side seeks
   ============================================================ */
let tapTimer=null, lastTap=0, lastSide=null;
gesture.addEventListener('click', e=>{
  showControls();
  const r=gesture.getBoundingClientRect();
  const x=e.clientX-r.left, w=r.width;
  const side = x < w*0.35 ? 'left' : x > w*0.65 ? 'right' : 'center';
  const now=Date.now();
  if(now-lastTap<300 && side===lastSide && side!=='center'){
    clearTimeout(tapTimer); tapTimer=null; lastTap=0; lastSide=null;
    if(side==='right'){ seekBy(10); showSeekFX('right'); } else { seekBy(-10); showSeekFX('left'); }
    return;
  }
  lastTap=now; lastSide=side;
  clearTimeout(tapTimer);
  tapTimer=setTimeout(()=>{ togglePlay(); tapTimer=null; }, side==='center'?0:240);
});

/* ============================================================
   AUTO-HIDE CHROME (2.5s)
   ============================================================ */
let hideTimer=null;
function showControls(force){
  player.classList.remove('idle');
  clearTimeout(hideTimer);
  if(force) return;
  scheduleHide();
}
function scheduleHide(){
  clearTimeout(hideTimer);
  hideTimer=setTimeout(()=>{
    if(v.paused || menuOpen || hoverControls || playlistOpen) return;
    player.classList.add('idle');
    closeMenus();
  }, 2500);
}
player.addEventListener('mousemove', ()=>showControls());
player.addEventListener('touchstart', ()=>showControls(), {passive:true});
// keep visible while hovering the control bar
document.querySelectorAll('.chrome').forEach(c=>{
  c.addEventListener('mouseenter', ()=>{ hoverControls=true; showControls(true); });
  c.addEventListener('mouseleave', ()=>{ hoverControls=false; scheduleHide(); });
});

/* ============================================================
   SPEED MENU
   ============================================================ */
const SPEEDS=[0.5,0.75,1,1.25,1.5,2];
let speed=1;
function buildSpeedMenu(){
  document.getElementById('speedList').innerHTML = SPEEDS.map(s=>`
    <div class="mi ${s===speed?'active':''}" onclick="setSpeed(${s})">
      <span>${s===1?'Normal (1x)':s+'x'}</span><span class="tick">${s===speed?'<i class="fa-solid fa-check"></i>':''}</span>
    </div>`).join('');
}
function setSpeed(s){ speed=s; v.playbackRate=s; document.querySelector('#speedBtn .badge').textContent=s+'x'; buildSpeedMenu(); closeMenus(); }

/* ============================================================
   MENUS
   ============================================================ */
function toggleMenu(which){
  const map={speed:'menuSpeed',cc:'menuCC'};
  const target=document.getElementById(map[which]);
  const wasOpen=target.classList.contains('open');
  closeMenus();
  if(!wasOpen){ target.classList.add('open'); menuOpen=true; showControls(true); }
}
function closeMenus(){ document.querySelectorAll('.menu').forEach(m=>m.classList.remove('open')); menuOpen=false; scheduleHide(); }
document.addEventListener('click', e=>{
  if(!e.target.closest('.menu') && !e.target.closest('#speedBtn') && !e.target.closest('#ccBtn')) {
    if(menuOpen) closeMenus();
  }
});

/* ============================================================
   SUBTITLES / CC
   ============================================================ */
const ccBtn=document.getElementById('ccBtn');
document.getElementById('vttInput').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  [...v.querySelectorAll('track')].forEach(t=>t.remove());
  const track=document.createElement('track');
  track.kind='subtitles'; track.label=f.name.replace(/\.vtt$/i,''); track.srclang='en';
  track.src=URL.createObjectURL(f); track.default=true;
  v.appendChild(track);
  document.getElementById('ccLabel').textContent=track.label;
  document.getElementById('ccOn').style.display='flex';
  setTimeout(()=>setCC('on'),100);
  e.target.value='';
});
function setCC(mode){
  const tracks=v.textTracks;
  for(let i=0;i<tracks.length;i++) tracks[i].mode = (mode==='on'?'showing':'disabled');
  ccBtn.style.color = mode==='on' ? 'var(--nf-red)' : '#fff';
  document.querySelectorAll('#menuCC .mi[data-cc]').forEach(mi=>{
    mi.classList.toggle('active', mi.dataset.cc===mode);
    mi.querySelector('.tick').innerHTML = mi.dataset.cc===mode?'<i class="fa-solid fa-check"></i>':'';
  });
  closeMenus();
}

/* ============================================================
   FULLSCREEN
   ============================================================ */
function toggleFullscreen(){
  if(!document.fullscreenElement){ (player.requestFullscreen||player.webkitRequestFullscreen).call(player); }
  else{ (document.exitFullscreen||document.webkitExitFullscreen).call(document); }
}
document.addEventListener('fullscreenchange', ()=>{
  document.getElementById('fsBtn').innerHTML = document.fullscreenElement ? '<i class="fa-solid fa-compress"></i>' : '<i class="fa-solid fa-expand"></i>';
});

/* ============================================================
   FILES + PLAYLIST
   ============================================================ */
document.getElementById('fileInput').addEventListener('change', addFiles);
function addFiles(e){
  const files=[...e.target.files].filter(f=>f.type.startsWith('video/'));
  if(!files.length) return;
  const wasEmpty = playlist.length===0;
  files.forEach(f=> playlist.push({ name:f.name.replace(/\.[^.]+$/,''), url:URL.createObjectURL(f), type:f.type }));
  buildPlaylist();
  if(wasEmpty){ document.getElementById('empty').hidden=true; playIndex(0); }
  e.target.value='';
}
function playIndex(i){
  if(i<0||i>=playlist.length) return;
  currentIndex=i;
  const item=playlist[i];
  v.src=item.url;
  document.getElementById('title').textContent=item.name;
  document.getElementById('subtitleLine').textContent = `Item ${i+1} of ${playlist.length}`;
  buildPlaylist();
  v.play().catch(()=>{});
  paintVol(); v.playbackRate=speed;
}
function buildPlaylist(){
  const box=document.getElementById('plList');
  box.innerHTML = playlist.length? playlist.map((it,i)=>`
    <div class="pl-item ${i===currentIndex?'active':''}" onclick="playIndex(${i});togglePlaylist(true)">
      <div class="pl-thumb"><i class="fa-solid ${i===currentIndex?'fa-play':'fa-film'}"></i></div>
      <div class="min-w-0 flex-1">
        <div class="text-white text-[14px] font-semibold truncate">${escapeHtml(it.name)}</div>
        <div class="text-[12px]" style="color:#888">${i===currentIndex?'Now playing':'Tap to play'}</div>
      </div>
    </div>`).join('') : `<div class="text-center text-white/40 text-[13px] py-10">No videos yet.<br>Add some below.</div>`;
}
function togglePlaylist(forceClose){
  const p=document.getElementById('playlist');
  playlistOpen = forceClose ? false : !playlistOpen;
  p.classList.toggle('open', playlistOpen);
  if(playlistOpen) showControls(true); else scheduleHide();
}

function exitOrBack(){
  if(document.fullscreenElement) toggleFullscreen();
  else if(playlistOpen) togglePlaylist(true);
}

/* ============================================================
   KEYBOARD
   ============================================================ */
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT') return;
  switch(e.key){
    case ' ': case 'k': e.preventDefault(); togglePlay(); break;
    case 'ArrowRight': seekBy(10); showSeekFX('right'); break;
    case 'ArrowLeft': seekBy(-10); showSeekFX('left'); break;
    case 'ArrowUp': e.preventDefault(); v.volume=Math.min(1,v.volume+.1); v.muted=false; paintVol(); break;
    case 'ArrowDown': e.preventDefault(); v.volume=Math.max(0,v.volume-.1); paintVol(); break;
    case 'f': toggleFullscreen(); break;
    case 'm': toggleMute(); break;
  }
  showControls();
});

function escapeHtml(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- boot ---------- */
buildSpeedMenu(); paintVol(); setCC('off');
</script>
</body>
</html>
